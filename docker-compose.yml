version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend-sessions:/app/sessions
      - backend-data:/app/data
    environment:
      - PORT=5000
      - DATABASE_URL=file:/app/data/database.db
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-sessions:
  backend-data:
